name: Code Coverage Report.

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'release/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  code_coverage_report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Guarded so a warm cache does not recompile tarpaulin from source on
      # every run.
      - name: Install Tarpaulin
        run: command -v cargo-tarpaulin > /dev/null || cargo install cargo-tarpaulin

      # `benches/**` is excluded: the criterion harness is measurement code, not
      # library code, and counting it would inflate the coverage figure.
      - name: Generate code coverage report
        run: >
          LOGLEVEL=WARN cargo tarpaulin
          --exclude-files 'benches/**'
          --all-features
          --workspace
          --timeout 180
          --out Xml

      - name: Upload coverage reports to Codecov.io
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
