name: Run Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - 'release/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  run_tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: make test

      # Compiles the criterion benchmarks without running them. A timing taken
      # on a shared runner is not a measurement, but a benchmark that stops
      # compiling is a real regression, and this catches it.
      - name: Compile benchmarks
        run: make bench-build
