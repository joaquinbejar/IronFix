name: SEMVER

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - 'release/**'

# Cancel any in-flight jobs for the same PR/branch so there's only one active
# at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: full

jobs:
  # Every crate published by `make publish-all` that cargo-semver-checks can
  # analyse. ironfix-example is included: it is published to crates.io like the
  # rest, so its `prelude` and module facade are a semver-governed surface, and
  # "it is only a demo" is not a reason to leave a published crate ungated.
  #
  # ironfix-derive is absent, and that is not a policy choice. cargo-semver-checks
  # analyses rustdoc JSON for library targets and refuses a proc-macro crate:
  #
  #   error: no crates with library targets selected, nothing to semver-check
  #   note: skipped the following crates since they have no library target:
  #         ironfix-derive
  #
  # The two exported derives (FixMessage, FixField) are still a public surface;
  # renaming or removing one is still a breaking change. It has to be caught in
  # review until the tool grows proc-macro support.
  semver:
    name: semver (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - ironfix-core
          - ironfix-tagvalue
          - ironfix-dictionary
          - ironfix-session
          - ironfix-store
          - ironfix-transport
          - ironfix-fast
          - ironfix-engine
          - ironfix-codegen
          - ironfix-example
    steps:
      - uses: actions/checkout@v4
      - name: Check semver for ${{ matrix.package }}
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: ${{ matrix.package }}
          feature-group: all-features
          rust-toolchain: stable
