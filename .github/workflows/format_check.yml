name: Format Check

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - 'release/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  format_check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      # `make fmt-check` runs `cargo fmt --all --check`: it prints the diff and
      # exits non-zero. It must never be `make fmt`, which rewrites the files in
      # the runner's own checkout and always exits 0 - a gate that cannot fail.
      - name: Format check
        run: make fmt-check
